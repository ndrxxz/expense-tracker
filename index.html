<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <div class="header">
            <h1>Expense Tracker</h1>
            <p>Track your daily expenses, manage your budget, and see where your money goes—all in one place.</p>
        </div>

        <div class="container">
            <div class="summary">
                <div class="summary-container">
                    <div class="summary-title">Monthly budget</div>
                    <div class="summary-value" id="summary-budget">₱0</div>
                </div>
                <div class="summary-container">
                    <div class="summary-title">Total spent</div>
                    <div class="summary-value spent" id="summary-spent">₱0</div>
                </div>
                <div class="summary-container">
                    <div class="summary-title">Remaining</div>
                    <div class="summary-value remaining" id="summary-remaining">₱0</div>
                </div>
            </div>

            <div class="main">
                <div class="card">
                    <div class="card-title">Set budget</div>
                    <div class="form-group">
                        <label for="input-budget">Monthly budget (₱)</label>
                        <input type="number" id="input-budget" placeholder="e.g. 20000" min="0">
                    </div>
                    <button class="btn-add" id="btn-save-budget" style="background:#378ADD;">Save budget</button>

                    <div class="divider"></div>

                    <div class="card-title">Add expense</div>
                    <div class="form-group">
                        <label for="input-desc">Description</label>
                        <input type="text" id="input-desc" placeholder="e.g. Jollibee lunch" />
                    </div>

                    <div class="form-group">
                        <label for="input-amount">Amount (₱)</label>
                        <input type="number" id="input-amount" placeholder="0.00" min="0" />
                    </div>

                    <div class="form-group">
                        <label for="input-category">Category</label>
                        <select id="input-category">
                            <option value="" disabled selected>Select an option</option>
                            <option value="Food">🍔 Food</option>
                            <option value="Transport">🚌 Transport</option>
                            <option value="Bills">⚡ Bills</option>
                            <option value="Shopping">🛍️ Shopping</option>
                            <option value="Other">📦 Other</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="input-date">Date</label>
                        <input type="date" id="input-date" />
                    </div>

                    <div class="form-group">
                        <label for="input-notes">Notes (optional)</label>
                        <textarea id="input-notes" placeholder="Any extra details..."></textarea>
                    </div>

                    <button class="btn-add" id="btn-add-expense">+ Add expense</button>
                </div>

                <div class="card">
                    <div class="card-title">Expenses</div>

                    <!-- Empty state -->
                    <div class="empty-state" id="empty-state">
                        No expenses yet. Add one to get started!
                    </div>

                    <div class="expense-list" id="expense-list">
                        
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
